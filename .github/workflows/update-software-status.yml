name: Update Software Status

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-software-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run update script
        run: python scripts/update-software-status.py

      - name: Open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/properties/software_status_config.yaml
          if git diff --cached --quiet; then
            echo "No version changes — nothing to do"
            exit 0
          fi
          BRANCH="automated/software-status-update"
          git checkout -b "$BRANCH"
          git commit -m "chore: update software status versions"
          git push -f origin "$BRANCH"
          if gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q '^[0-9]'; then
            echo "PR already open for $BRANCH — branch updated with latest versions"
          else
            gh pr create \
              --title "chore: update software status versions" \
              --body "Automated nightly update of software status version data from TrueNAS CDN APIs." \
              --head "$BRANCH"
          fi
